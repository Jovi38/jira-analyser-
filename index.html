<!DOCTYPE html>
<html>
<head>
    <title>Jira CSV Analyser</title>

    <style>
        :root {
            --bg: #f5f7fa;
            --surface: #ffffff;
            --border: #d6dce5;
            --primary: #2d3e50;
            --primary-dark: #1b2836;
            --text: #2d3e50;
            --muted: #7b8794;
            --accent-bg: #f9fafc;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: var(--surface);
            padding: 38px;
            border-radius: 14px;
            box-shadow: 0px 10px 28px rgba(0,0,0,0.08);
            width: 460px;

            animation: fadeIn 0.35s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            margin-bottom: 4px;
            font-size: 22px;
            color: var(--text);
        }

        .subtitle {
            color: var(--muted);
            margin-bottom: 28px;
            font-size: 14px;
        }

        /* ---------- File Input ---------- */

        .file-wrapper {
            border: 2px dashed var(--border);
            padding: 22px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--surface);
        }

        .file-wrapper:hover {
            background: var(--accent-bg);
            border-color: var(--primary);
        }

        .file-wrapper.dragover {
            border-color: var(--primary);
            background: var(--accent-bg);
            transform: scale(1.01);
        }

        .file-text {
            font-size: 14px;
            color: var(--muted);
        }

        .file-text strong {
            color: var(--primary);
        }

        input[type="file"] {
            display: none;
        }

        .file-name {
            margin-top: 12px;
            font-size: 13px;
            color: var(--primary);
            min-height: 18px;
        }

        /* ---------- Button ---------- */

        button {
            margin-top: 26px;
            padding: 12px;
            border: none;
            background-color: var(--primary);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            font-weight: 500;

            transition: all 0.15s ease;
        }

        button:hover {
            background-color: var(--primary-dark);
            transform: translateY(-1px);
        }

        button:active {
            transform: scale(0.99);
        }

        button:disabled {
            background-color: #9aa5b1;
            cursor: not-allowed;
            transform: none;
        }

        /* ---------- Progress ---------- */

        .progress-container {
            margin-top: 24px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            background-color: #edf1f7;
            border-radius: 8px;
            overflow: hidden;
            height: 8px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: var(--primary);
            transition: width 0.2s ease;
        }

        .status {
            margin-top: 10px;
            font-size: 13px;
            color: var(--muted);
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Jira CSV Analysis Tool</h1>
    <div class="subtitle">Upload your Jira CSV export to generate analytics</div>

    <form id="uploadForm">

        <label class="file-wrapper" id="dropZone">
            <div class="file-text">
                <strong>Click</strong> or drag & drop CSV file
            </div>
            <input type="file" name="file" id="fileInput" required>
        </label>

        <div class="file-name" id="fileName"></div>

        <button type="submit" id="runButton">
            Run Analysis
        </button>

    </form>

    <div class="progress-container" id="progressContainer">

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="status" id="statusText">
            Uploading...
        </div>

    </div>

</div>

<script>

const fileInput = document.getElementById("fileInput");
const fileNameText = document.getElementById("fileName");
const dropZone = document.getElementById("dropZone");

fileInput.addEventListener("change", updateFileName);

function updateFileName() {
    if (fileInput.files.length) {
        fileNameText.innerText = "Selected: " + fileInput.files[0].name;
    }
}

/* ---------- Drag & Drop Support ---------- */

dropZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropZone.classList.remove("dragover");

    fileInput.files = e.dataTransfer.files;
    updateFileName();
});

/* ---------- Upload Logic ---------- */

document.getElementById("uploadForm").addEventListener("submit", function(e) {

    e.preventDefault();

    const button = document.getElementById("runButton");
    const progressContainer = document.getElementById("progressContainer");
    const progressFill = document.getElementById("progressFill");
    const statusText = document.getElementById("statusText");

    if (!fileInput.files.length) return;

    const file = fileInput.files[0];
    const formData = new FormData();
    formData.append("file", file);

    const xhr = new XMLHttpRequest();
    xhr.open("POST", "/analysis", true);

    progressContainer.style.display = "block";
    button.disabled = true;
    statusText.innerText = "Uploading CSV...";

    xhr.upload.onprogress = function(event) {
        if (event.lengthComputable) {
            const percent = (event.loaded / event.total) * 100;
            progressFill.style.width = percent + "%";
        }
    };

    xhr.onload = function() {

        if (xhr.status === 200) {
            statusText.innerText = "Processing CSV & Generating Dashboard...";
            document.open();
            document.write(xhr.responseText);
            document.close();
        } else {
            statusText.innerText = "Upload failed. Please try again.";
            button.disabled = false;
        }

    };

    xhr.send(formData);

});

</script>

</body>
</html>
